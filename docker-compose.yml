version: "3.8"

services:
  viewer-counter:
    build:
      context: .
      dockerfile: viewer.Dockerfile
    container_name: freetv-viewer-counter
    restart: unless-stopped
    # No ports exposed — only reachable internally via nginx proxy

  iptv:
    build: .
    container_name: freetv-player
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - viewer-counter
