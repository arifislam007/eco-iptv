version: "3.8"

services:
  iptv:
    build: .
    container_name: freetv-player
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - viewer-counter

  viewer-counter:
    image: node:20-alpine
    container_name: freetv-viewer-counter
    working_dir: /app
    volumes:
      - ./viewer-server.js:/app/server.js
    command: sh -c "npm install ws && node server.js"
    restart: unless-stopped
    # No ports exposed — only reachable internally via nginx proxy
